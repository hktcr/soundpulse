    // F4: Audio feedback
    const spAudioCtx = window.AudioContext ? new AudioContext() : (window.webkitAudioContext ? new webkitAudioContext() : null);
    function playBeep(isCorrect) {
        if (!spAudioCtx) return;
        try {
            if (spAudioCtx.state === 'suspended' && typeof spAudioCtx.resume === 'function') {
                spAudioCtx.resume().catch(() => {});
            }
            const osc = spAudioCtx.createOscillator();
            const gain = spAudioCtx.createGain();
            osc.connect(gain);
            gain.connect(spAudioCtx.destination);
            
            const now = spAudioCtx.currentTime;
            if (isCorrect) {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.start(now); osc.stop(now + 0.15);
            } else {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(150, now + 0.2);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            }
        } catch(e) {
            console.warn('Beep playback failed:', e);
        }
    }

    function updatePlayBtn() {
        const btn = document.getElementById('spPlayBtn') || document.getElementById('spTeacherPlayBtn');
        if (btn) btn.textContent = SP.isPlaying ? '⏸' : '▶';
    }

    function onAudioTimeUpdate() {
        const t = audioEl.currentTime;
        SP.audioTime = t;
        const dur = audioEl.duration || 1;

        // Progress bar
        const pct = (t / dur) * 100;
        progressBar.style.width = pct + '%';
        progressBar.setAttribute('aria-valuenow', Math.round(pct));

        // Time display
        const timeNow = document.getElementById('spTimeNow');
        if (timeNow) timeNow.textContent = formatTime(t);

        // Timeline slider
        const timeline = document.getElementById('spTimeline') || document.getElementById('spTeacherTimeline');
        if (timeline && !timeline.matches(':active')) timeline.value = Math.floor(t);

        updateTranscriptHighlight(t);
        updateVisualSegment();

        // Check auto-trigger questions
        checkAutoQuestions(t);
    }

    // ═══════════════════════════════════════════
    // TRANSCRIPT
    // ═══════════════════════════════════════════

    async function loadTranscript() {
        try {
            const url = CONFIG_DATA ? CONFIG_DATA.transcriptionFile : 'assets/soundpulse_transcription.json';
            const resp = await fetch(url + '?v=' + Date.now());
            TRANSCRIPTION = await resp.json();
            renderTranscriptWords();
        } catch(e) { console.warn('Transcript not loaded:', e); }
    }

    function renderTranscriptWords() {
        const container = document.getElementById('spTranscript');
        if (!container || !TRANSCRIPTION.segments) return;
        // Build glossary lookup (lowercase)
        const glossKeys = Object.keys(GLOSSARY).sort((a, b) => b.length - a.length);
        let html = '';
        TRANSCRIPTION.segments.forEach((seg, sIdx) => {
            if (sIdx > 0) html += '<span class="sp-segment-break"></span>';
            (seg.words || []).forEach((w, wIdx) => {
                const clean = w.word.toLowerCase().replace(/[.,!?:;"'()]/g, '');
                const glossDef = GLOSSARY[clean];
                if (glossDef) {
                    html += `<span class="sp-word has-gloss" data-start="${w.start}" data-end="${w.end}" id="w_${sIdx}_${wIdx}" tabindex="0">${w.word}<span class="sp-gloss-popup">${glossDef}</span> </span>`;
                } else {
                    html += `<span class="sp-word" data-start="${w.start}" data-end="${w.end}" id="w_${sIdx}_${wIdx}">${w.word} </span>`;
                }
            });
        });
        container.innerHTML = html;
    }



    function updateTranscriptHighlight(time) {
        const words = document.querySelectorAll('.sp-word');
        let activeEl = null;
        words.forEach(w => {
            const start = parseFloat(w.dataset.start);
            const end = parseFloat(w.dataset.end);
            w.classList.remove('active', 'spoken');
            if (time >= start && time < end) {
                w.classList.add('active');
                activeEl = w;
            } else if (time >= end) {
                w.classList.add('spoken');
            }
        });
        if (activeEl) {
            const container = document.getElementById('spTranscript');
            if (container) {
                const cRect = container.getBoundingClientRect();
                const wRect = activeEl.getBoundingClientRect();
                if (wRect.bottom > cRect.bottom - 40 || wRect.top < cRect.top + 40) {
                    activeEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }
        }
    }

    // ═══════════════════════════════════════════
    // VISUAL SEGMENTS
    // ═══════════════════════════════════════════

    function updateVisualSegment() {
        if (!CONFIG_DATA || !CONFIG_DATA.visualSegments) return;
        const t = SP.audioTime;
        let segIdx = 0;
        for (let i = 0; i < CONFIG_DATA.visualSegments.length; i++) {
            if (t >= CONFIG_DATA.visualSegments[i].start) segIdx = i;
        }
        if (segIdx !== SP.currentSegmentIdx) {
            SP.currentSegmentIdx = segIdx;
            const seg = CONFIG_DATA.visualSegments[segIdx];
            const img = document.getElementById('spVisualImg');
            const title = document.getElementById('spSegTitle');
            const visualSide = document.querySelector('.sp-visual-side');
            const splitLayout = document.querySelector('.sp-split-layout');
            
            if (seg.image) {
                if (img) { img.src = seg.image; img.style.opacity = '1'; }
                if (title) { title.textContent = seg.title; title.style.display = 'block'; }
                if (visualSide) visualSide.style.display = 'block';
                if (splitLayout) splitLayout.classList.remove('no-visual');
            } else {
                if (visualSide) visualSide.style.display = 'none';
                if (splitLayout) splitLayout.classList.add('no-visual');
            }
        }
        // Track max listened position
        if (t > (SP.maxListenedTime || 0)) SP.maxListenedTime = t;
    }

    // ═══════════════════════════════════════════
    // QUESTION ENGINE (V7: all 5 types)
    // ═══════════════════════════════════════════

    function checkAutoQuestions(time) {
        if (!CONFIG_DATA || !CONFIG_DATA.questions) return;
        CONFIG_DATA.questions.forEach((q, idx) => {
            if (q.triggerTime && q.triggerTime > 0 && time >= q.triggerTime && !SP.activatedQuestions.has(idx)) {
                SP.activatedQuestions.add(idx);
                audioEl.pause();
                SP.isPlaying = false;
                updatePlayBtn();
                showQuestion(idx);
            }
        });
    }

    function showQuestion(idx) {
        const q = CONFIG_DATA.questions[idx];
        if (!q) return;
        SP.currentQ = idx;
        saveSession();
        const wrap = document.getElementById('spQuestionWrap');
        const card = document.getElementById('spQuestionCard');
        if (!wrap || !card) return;

        const totalQ = CONFIG_DATA.questions.length;
        const qNum = idx + 1;
        const qText = (q.translations && q.translations[currentLang]) || q.text;

        const qTextGlossary = addGlossary(qText);
        let html = `
            <div class="sp-q-badge">${t('questionOf').replace('{n}', qNum).replace('{total}', totalQ)}</div>
            <p class="sp-q-text">${qTextGlossary}</p>
            <button class="sp-rewind-btn" onclick="rewindFromQuestion()" role="button" tabindex="0" ${keyHandler('rewindFromQuestion()')}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                Lyssna igen (30s)
            </button>`;

        switch (q.type) {
            case 'multiple-choice':
                html += renderMCQuestion(q, idx);
                break;
            case 'categorize':
                html += renderCategorizeQuestion(q, idx);
                break;
            case 'match':
                html += renderMatchQuestion(q, idx);
                break;
            case 'lucktext':
                html += renderLucktextQuestion(q, idx);
                break;
            case 'freetext':
                html += renderFreetextQuestion(q, idx);
                break;
            case 'feedback':
                html += renderFeedbackQuestion(q, idx);
                break;
            default:
                html += `<p style="color:var(--sp-text-muted)">Okänd frågetyp: ${q.type}</p>`;
        }

        html += `
            <div class="sp-feedback" id="spFeedback" aria-live="assertive" role="status"></div>
            <button class="sp-continue-btn" id="spContinueBtn"
                onclick="closeQuestion()" role="button" tabindex="0"
                ${keyHandler('closeQuestion()')}
                aria-label="${t('continueBtn')}">
                ${t('continueBtn')}
            </button>`;

        card.innerHTML = html;
        wrap.classList.add('show');
        // Activate focus trap for accessibility
        requestAnimationFrame(() => trapFocus(card));

        // Update progress text
        const pt = document.getElementById('spProgressText');
        if (pt) pt.textContent = t('questionOf').replace('{n}', qNum).replace('{total}', totalQ);
    }

    function closeQuestion() {
        const wrap = document.getElementById('spQuestionWrap');
        const card = document.getElementById('spQuestionCard');
        if (card) releaseFocusTrap(card);
        if (wrap) wrap.classList.remove('show');
        SP.currentQ = -1;
        saveSession();
        try {
            // Rewind 5 seconds for context, then resume
            if (audioEl) {
                audioEl.currentTime = Math.max(0, audioEl.currentTime - 5);
                if (SP.mode !== 'teacher') {
                    audioEl.play().catch(() => {});
                    SP.isPlaying = true;
                    updatePlayBtn();
                }
            }
        } catch(e) {
            console.warn('Failed to resume audio playback:', e);
        }
        if (SP.mode === 'teacher') {
            broadcastTeacherState();
        }
    }

    // ─── MC ───
    function renderMCQuestion(q, idx) {
        let html = '<div class="sp-options">';
        q.options.forEach(opt => {
            html += `
                <div class="sp-opt" role="button" tabindex="0" id="opt_${idx}_${opt.letter}"
                    onclick="selectMCAnswer(this, ${idx}, '${opt.letter}')"
                    ${keyHandler(`selectMCAnswer(document.getElementById('opt_${idx}_${opt.letter}'), ${idx}, '${opt.letter}')`)}>
                    <span class="sp-letter">${opt.letter}</span>
                    <span>${opt.text}</span>
                </div>`;
        });
        html += '</div>';
        return html;
    }

    function selectMCAnswer(el, idx, letter) {
        if (SP.answers[CONFIG_DATA.questions[idx].id]) return; // already answered
        const q = CONFIG_DATA.questions[idx];
        const correct = letter === q.correct;
        SP.answers[q.id] = letter;

        // Visual feedback
        el.classList.add(correct ? 'correct-opt' : 'wrong-opt');
        if (!correct) {
            const correctEl = document.getElementById(`opt_${idx}_${q.correct}`);
            if (correctEl) correctEl.classList.add('correct-opt');
        }

        // Dim other options
        document.querySelectorAll(`[id^="opt_${idx}_"]`).forEach(o => {
            if (o !== el && !o.classList.contains('correct-opt')) o.classList.add('dimmed');
        });

        showFeedback(correct, correct ? q.feedbackOk : q.feedbackNok);
        if (correct && navigator.vibrate) navigator.vibrate(50);
        playBeep(correct);
        submitAnswer(q.id, letter);
    }

    // ─── CATEGORIZE ───
    function renderCategorizeQuestion(q, idx) {
        catAssignments = {};
        q.items.forEach((item, i) => { catAssignments[i] = -1; });

        let html = `<p style="font-size:0.8rem;color:var(--sp-text-muted);margin-bottom:0.8rem">Tips: Klicka på ett begrepp för att tilldela det en kategori. Klicka igen för att byta.</p>`;
        html += '<div class="sp-chip-pool" id="spChipPool">';
        q.items.forEach((item, i) => {
            html += `<span class="sp-chip" role="button" tabindex="0" id="chip_${idx}_${i}"
                onclick="cycleCatChip(${idx}, ${i})"
                ${keyHandler(`cycleCatChip(${idx}, ${i})`)}>
                ${item.word}
            </span>`;
        });
        html += '</div>';

        html += '<div class="sp-cat-area">';
        q.categories.forEach((cat, ci) => {
            html += `
                <div class="sp-cat-bucket" id="bucket_${idx}_${ci}">
                    <div class="sp-cat-bucket-title">${cat}</div>
                    <div class="sp-chip-pool" id="bucketItems_${idx}_${ci}"></div>
                </div>`;
        });
        html += '</div>';

        html += `<button class="sp-submit-btn" id="spCatSubmit" onclick="checkCategorize(${idx})"
            ${keyHandler(`checkCategorize(${idx})`)} role="button" tabindex="0">
            ${t('checkBtn')}</button>`;
        return html;
    }

    function cycleCatChip(qIdx, chipIdx) {
        const q = CONFIG_DATA.questions[qIdx];
        const numCats = q.categories.length;
        catAssignments[chipIdx] = (catAssignments[chipIdx] + 1) % (numCats + 1);
        if (catAssignments[chipIdx] === numCats) catAssignments[chipIdx] = -1;

        const chip = document.getElementById(`chip_${qIdx}_${chipIdx}`);
        if (!chip) return;

        // Remove all assigned classes
        chip.className = 'sp-chip';
        if (catAssignments[chipIdx] >= 0) {
            chip.classList.add(`assigned-${catAssignments[chipIdx]}`);
        }
    }

    function checkCategorize(qIdx) {
        const q = CONFIG_DATA.questions[qIdx];
        let allCorrect = true;
        let allAssigned = true;

        q.items.forEach((item, i) => {
            if (catAssignments[i] === -1) allAssigned = false;
        });

        if (!allAssigned) {
            // Shake unassigned
            q.items.forEach((item, i) => {
                if (catAssignments[i] === -1) {
                    const chip = document.getElementById(`chip_${qIdx}_${i}`);
                    if (chip) { chip.style.animation = 'none'; chip.offsetHeight; chip.style.animation = 'spCardEnter 0.3s'; }
                }
            });
            return;
        }

        // Disable further interaction
        document.getElementById('spCatSubmit').disabled = true;

        q.items.forEach((item, i) => {
            const chip = document.getElementById(`chip_${qIdx}_${i}`);
            if (!chip) return;
            const isCorrect = catAssignments[i] === item.cat;
            chip.className = 'sp-chip';
            chip.classList.add(isCorrect ? 'correct-chip' : 'wrong-chip');
            chip.style.pointerEvents = 'none';
            if (!isCorrect) allCorrect = false;
        });

        SP.answers[q.id] = allCorrect ? 'correct' : 'incorrect';
        showFeedback(allCorrect, allCorrect ? q.feedbackOk : q.feedbackNok);
        if (allCorrect && navigator.vibrate) navigator.vibrate(50);
        playBeep(allCorrect);
        submitAnswer(q.id, SP.answers[q.id]);
    }

    // ─── MATCH ───
    function renderMatchQuestion(q, idx) {
        matchSelectedLeft = null;
        matchPairs = [];
        matchShuffledRight = shuffleArray(q.pairs.map((p, i) => ({ text: p.right, origIdx: i })));

        let html = `<p style="font-size:0.8rem;color:var(--sp-text-muted);margin-bottom:0.8rem">Tips: ${t('matchHint')}</p>`;
        html += '<div class="sp-match-area">';

        // Left column
        html += '<div>';
        q.pairs.forEach((p, i) => {
            html += `<div class="sp-match-item" role="button" tabindex="0" id="ml_${idx}_${i}"
                onclick="selectMatchLeft(${idx}, ${i})"
                ${keyHandler(`selectMatchLeft(${idx}, ${i})`)}>
                ${p.left}
            </div>`;
        });
        html += '</div>';

        // Right column (shuffled)
        html += '<div>';
        matchShuffledRight.forEach((item, i) => {
            html += `<div class="sp-match-item" role="button" tabindex="0" id="mr_${idx}_${i}"
                onclick="selectMatchRight(${idx}, ${i})"
                ${keyHandler(`selectMatchRight(${idx}, ${i})`)}>
                ${item.text}
            </div>`;
        });
        html += '</div>';
        html += '</div>';

        html += `<button class="sp-submit-btn" id="spMatchSubmit" onclick="checkMatch(${idx})"
            ${keyHandler(`checkMatch(${idx})`)} role="button" tabindex="0">
            ${t('checkBtn')}</button>`;
        return html;
    }

    function selectMatchLeft(qIdx, leftIdx) {
        // Clear previous selection
        document.querySelectorAll(`[id^="ml_${qIdx}_"]`).forEach(el => el.classList.remove('selected'));
        const el = document.getElementById(`ml_${qIdx}_${leftIdx}`);
        if (el && !el.classList.contains('paired')) {
            el.classList.add('selected');
            matchSelectedLeft = leftIdx;
        }
    }

    function selectMatchRight(qIdx, rightIdx) {
        if (matchSelectedLeft === null) return;
        const rightEl = document.getElementById(`mr_${qIdx}_${rightIdx}`);
        const leftEl = document.getElementById(`ml_${qIdx}_${matchSelectedLeft}`);
        if (!rightEl || rightEl.classList.contains('paired')) return;
        if (!leftEl) return;

        // Pair them
        matchPairs.push({ left: matchSelectedLeft, right: rightIdx });
        leftEl.classList.remove('selected');
        leftEl.classList.add('paired');
        rightEl.classList.add('paired');

        // Add pair number indicator
        const pairNum = matchPairs.length;
        leftEl.textContent = `${pairNum}. ${leftEl.textContent}`;
        rightEl.textContent = `${pairNum}. ${rightEl.textContent}`;

        matchSelectedLeft = null;
    }

    function checkMatch(qIdx) {
        const q = CONFIG_DATA.questions[qIdx];
        if (matchPairs.length < q.pairs.length) return; // not all paired yet

        document.getElementById('spMatchSubmit').disabled = true;
        let allCorrect = true;

        matchPairs.forEach(pair => {
            const leftEl = document.getElementById(`ml_${qIdx}_${pair.left}`);
            const rightEl = document.getElementById(`mr_${qIdx}_${pair.right}`);
            const correctRightIdx = matchShuffledRight[pair.right].origIdx;
            const isCorrect = pair.left === correctRightIdx;

            if (leftEl) leftEl.classList.add(isCorrect ? 'correct-opt' : 'wrong-match');
            if (rightEl) rightEl.classList.add(isCorrect ? 'correct-opt' : 'wrong-match');
            if (!isCorrect) allCorrect = false;
        });

        SP.answers[q.id] = allCorrect ? 'correct' : 'incorrect';
        showFeedback(allCorrect, allCorrect ? q.feedbackOk : q.feedbackNok);
        if (allCorrect && navigator.vibrate) navigator.vibrate(50);
        playBeep(allCorrect);
        submitAnswer(q.id, SP.answers[q.id]);
    }

    // ─── LUCKTEXT ───
    function renderLucktextQuestion(q, idx) {
        const parts = q.text.split('___');
        let html = `<p style="font-size:0.8rem;color:var(--sp-text-muted);margin-bottom:0.8rem">Tips: ${t('lucktextHint')}</p>`;
        html += '<div class="sp-lucktext-area">';
        parts.forEach((part, i) => {
            html += `<span>${part}</span>`;
            if (i < parts.length - 1) {
                html += `<input type="text" class="sp-luck-input" id="luck_${idx}_${i}"
                    placeholder="..." aria-label="Lucka ${i + 1}" autocomplete="off">`;
            }
        });
        html += '</div>';
        html += `<button class="sp-submit-btn" onclick="checkLucktext(${idx})"
            ${keyHandler(`checkLucktext(${idx})`)} role="button" tabindex="0">
            ${t('checkBtn')}</button>`;
        return html;
    }

    function fuzzyMatch(input, expected) {
        const a = input.trim().toLowerCase().replace(/[\s.,-]+/g, '');
        const b = expected.trim().toLowerCase().replace(/[\s.,-]+/g, '');
        if (a === b) return true;
        // Accept singular/plural (Swedish: drop trailing 'n', 'en', 'er', 'na', 'erna')
        const stems = [a, a.replace(/(erna|arna|erna|na|en|er|n|s)$/,'')];
        const targets = [b, b.replace(/(erna|arna|erna|na|en|er|n|s)$/,'')];
        return stems.some(s => targets.some(t => s === t || (s.length > 3 && t.length > 3 && (s.startsWith(t) || t.startsWith(s)))));
    }

    function checkLucktext(qIdx) {
        const q = CONFIG_DATA.questions[qIdx];
        let allCorrect = true;

        q.correctAnswers.forEach((correct, i) => {
            const input = document.getElementById(`luck_${qIdx}_${i}`);
            if (!input) return;
            const val = input.value.trim();
            const isCorrect = fuzzyMatch(val, correct);
            input.classList.add(isCorrect ? 'correct-input' : 'wrong-input');
            input.readOnly = true;
            if (!isCorrect) {
                allCorrect = false;
                input.value = `${input.value} → ${correct}`;
            }
        });

        SP.answers[q.id] = allCorrect ? 'correct' : 'incorrect';
        showFeedback(allCorrect, allCorrect ? q.feedbackOk : q.feedbackNok);
        if (allCorrect && navigator.vibrate) navigator.vibrate(50);
        playBeep(allCorrect);
        submitAnswer(q.id, SP.answers[q.id]);
    }

    function renderFreetextQuestion(q, idx) {

        html += `<div class="sp-freetext-area">

    }

    function checkFreetext(qIdx) {

    // ─── FEEDBACK (star rating + comment) ───
    function renderFeedbackQuestion(q, idx) {
        selectedStars = 0; // reset
        let html = '<div class="sp-feedback-form">';
        html += `<p style="font-size:0.85rem;color:var(--sp-text);margin-bottom:0.6rem">${q.ratingLabel || 'Betygsätt övningen'}</p>`;
        html += '<div class="sp-star-row" id="spStarRow">';
        for (let i = 1; i <= 5; i++) {
            html += `<button class="sp-star" data-val="${i}" onclick="selectStar(${i})" aria-label="${i} stjärnor">☆</button>`;
        }
        html += '</div>';
        html += `<p style="font-size:0.8rem;color:var(--sp-text-muted);margin-top:0.8rem;margin-bottom:0.3rem">${q.commentLabel || 'Kommentar'}</p>`;
        html += `<textarea class="sp-freetext-textarea" id="feedbackComment_${idx}" placeholder="${q.commentPlaceholder || 'Din kommentar (valfritt)...'}" rows="3" style="width:100%;"></textarea>`;

    let selectedStars = 0;
    function selectStar(n) {
        selectedStars = n;
        document.querySelectorAll('.sp-star').forEach(s => {
            const v = parseInt(s.dataset.val);
            s.textContent = v <= n ? '★' : '☆';
            s.style.opacity = v <= n ? '1' : '0.5';
            s.style.color = v <= n ? '#fde047' : 'var(--sp-text-muted)';
        });
    }
    window.selectStar = selectStar;

    function submitFeedback(qIdx) {
        const q = CONFIG_DATA.questions[qIdx];
        const comment = document.getElementById(`feedbackComment_${qIdx}`);
        if (selectedStars === 0) {
            const row = document.getElementById('spStarRow');
            if (row) { row.style.outline = '2px solid var(--sp-incorrect)'; setTimeout(() => row.style.outline = '', 600); }
            return;
        }
        const commentVal = comment ? comment.value.trim() : '';
        const answer = `${selectedStars}|${commentVal}`;
        SP.answers[q.id] = answer;
        if (comment) comment.readOnly = true;
        document.querySelectorAll('.sp-star').forEach(s => s.disabled = true);
        showFeedback(true, q.feedbackMsg || 'Tack!');
        playBeep(true);
        submitAnswer(q.id, answer.substring(0, 200));
    }
    window.submitFeedback = submitFeedback;

    // ─── FEEDBACK ───
    function showFeedback(correct, message) {
        const fb = document.getElementById('spFeedback');
        const cont = document.getElementById('spContinueBtn');
        if (fb) {
            fb.className = `sp-feedback show ${correct ? 'ok' : 'nok'}`;
            fb.innerHTML = `<span class="sp-result-icon">${correct ? '✓' : '✗'}</span> ${message}`;
        }
        if (cont) cont.classList.add('show');
    }

    // ═══════════════════════════════════════════
    // TEACHER PANEL (K1, K4, V3, V5)

    function broadcastTeacherState() {
        setTeacherState(SP.audioTime, SP.teacherPushedQ, SP.isPlaying, teacherMsgColor, teacherMsgText);

    function startTeacherBroadcast() {
        setInterval(() => {

    function startTeacherPolling() {
        // Immediately poll
        discoverStudents();
        // Then every POLL_INTERVAL
        SP.pollInterval = setInterval(() => {
            discoverStudents();
        }, SP_CONFIG.POLL_INTERVAL);
    }

    let teacherPollCount = 0;
    async function discoverStudents() {
        try {
            teacherPollCount++;
            // Poll all 60 slots and check heartbeats only on first poll and then every 3rd poll (every 24s)
            const shouldPollSlots = (teacherPollCount === 1 || teacherPollCount % 3 === 0);

            if (shouldPollSlots) {
                const MAX_SLOTS = 60;
                const slotPromises = [];
                for (let i = 0; i < MAX_SLOTS; i++) {
                    slotPromises.push(apiGet(`slot_${i}`).catch(() => null));
                }
                const slots = await Promise.all(slotPromises);

                const discoveredIds = [];
                for (const raw of slots) {
                    if (!raw) continue;
                    try {
                        const sid = hexToStr(raw);
                        if (sid && sid.startsWith('sp_') && !discoveredIds.includes(sid)) {
                            discoveredIds.push(sid);
                        }
                    } catch(e) { /* skip corrupt */ }
                }

                // Check heartbeats — 15 minute timeout, but NEVER remove students
                const HB_TIMEOUT = 15 * 60 * 1000;
                const now = Date.now();
                const heartbeats = await Promise.all(
                    discoveredIds.map(sid => apiGet(`hb_${sid}`).catch(() => null))
                );

                // Track active vs inactive (but keep all)
                const studentStatus = {};
                discoveredIds.forEach((sid, i) => {
                    const hb = heartbeats[i] ? parseInt(heartbeats[i], 10) : now;
                    studentStatus[sid] = (now - hb) < HB_TIMEOUT ? 'active' : 'inactive';
                });

                // Add new students (never remove existing ones)
                const unknownIds = discoveredIds.filter(sid => !SP.knownStudents.has(sid));
                if (unknownIds.length > 0) {
                    const names = await Promise.all(
                        unknownIds.map(sid => apiGet(`stu_${sid}`).catch(() => null))
                    );
                    unknownIds.forEach((sid, i) => {
                        const name = names[i] ? hexToStr(names[i]) : 'Gäst';
                        SP.knownStudents.set(sid, name);
                    });
                }

                // Store status for UI dimming
                SP.studentStatus = studentStatus;
            }

            // Always poll answers for the known students
            await pollStudentResponses();
        } catch(e) {
            console.warn('Student discovery failed:', e);
        }
    }

    async function pollStudentResponses() {
        const dashboard = document.getElementById('spTeacherDashboard');
        if (!dashboard || !CONFIG_DATA) return;

        const totalStudents = SP.knownStudents.size;
        if (totalStudents === 0) {
            dashboard.innerHTML = `<div class="sp-dash-header">${t('noStudents')}</div>`;
            return;
        }

        // Parallel fetch all student answers
        const sids = [...SP.knownStudents.keys()];
        const results = await Promise.all(
            sids.map(sid => apiGet(`ans_${sid}`).catch(() => null))
        );
        results.forEach((raw, i) => {
            if (!raw) return;
            try {
                const decoded = hexToStr(raw);
                const ansMap = {};
                decoded.split(',').forEach(pair => {
                    const colonIdx = pair.indexOf(':');
                    if (colonIdx > 0) {
                        ansMap[pair.substring(0, colonIdx)] = pair.substring(colonIdx + 1).replace(/\\c/g, ',');
                    }
                });
                SP.studentAnswers.set(sids[i], ansMap);
            } catch(e) { /* skip */ }
        });

        // Build grid dashboard
        const pl = totalStudents !== 1 ? 'er' : '';
        const dotColor = SP.offlineCount >= 2 ? 'var(--sp-incorrect)' : 'var(--sp-correct)';
        let html = `<div class="sp-dash-header"><span id="spLiveDot" class="sp-live-dot" style="background:${dotColor}" title="${SP.offlineCount >= 2 ? 'Tjänsten är trasig/nere' : 'Systemet online'}"></span> ${t('studentsConnected').replace('{n}', totalStudents).replace('{pl}', pl)}</div>`;
        html += '<div style="display:flex;gap:0.8rem;flex-wrap:wrap;margin:0.4rem 0 0.6rem;font-size:0.65rem;color:var(--sp-text-muted);">';
        html += '<span style="display:flex;align-items:center;gap:0.25rem;"><span style="width:10px;height:10px;border-radius:2px;background:#10b981;"></span> Rätt</span>';
        html += '<span style="display:flex;align-items:center;gap:0.25rem;"><span style="width:10px;height:10px;border-radius:2px;background:#eab308;"></span> Rätt (spol)</span>';
        html += '<span style="display:flex;align-items:center;gap:0.25rem;"><span style="width:10px;height:10px;border-radius:2px;background:#f97316;"></span> Fel (spol)</span>';
        html += '<span style="display:flex;align-items:center;gap:0.25rem;"><span style="width:10px;height:10px;border-radius:2px;background:#ef4444;"></span> Fel</span>';
        html += '<span style="display:flex;align-items:center;gap:0.25rem;"><span style="width:10px;height:10px;border-radius:2px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);"></span> Ej besvarad</span>';
        html += '</div>';

        // Question header row
        html += '<div class="sp-student-row" style="border-bottom:1px solid var(--sp-border);padding-bottom:0.4rem;margin-bottom:0.4rem;">';
        html += '<div class="sp-student-name" style="color:var(--sp-text-muted);font-size:0.7rem;">ELEV</div>';
        html += '<div class="sp-q-squares">';
        CONFIG_DATA.questions.forEach((q, idx) => {
            const qTitle = q.text ? q.text.replace(/"/g, '&quot;') : `Fråga ${idx+1}`;
            html += `<div class="sp-q-square" style="background:transparent;border-color:var(--sp-border);" data-q="${idx+1}"><div class="sp-tooltip"><strong>F${idx+1}:</strong> ${qTitle}</div></div>`;
        });
        html += '</div></div>';

        // Student rows
        SP.knownStudents.forEach((name, sid) => {
            const ansMap = SP.studentAnswers.get(sid) || {};
            html += '<div class="sp-student-row">';
            html += `<div class="sp-student-name">${name}</div>`;
            html += '<div class="sp-q-squares">';
            
            CONFIG_DATA.questions.forEach((q, idx) => {
                const rawAns = ansMap[q.id];
                let cls = '';
                if (!rawAns) {
                    cls = ''; // gray/empty
                } else {
                    const wasRewound = rawAns.startsWith('R');
                    const actualAns = wasRewound ? rawAns.substring(1) : rawAns;
                    let isCorrect = false;
                    if (q.type === 'freetext' || q.type === 'feedback') {
                        isCorrect = true;
                    } else if (q.type === 'multiple-choice') {
                        isCorrect = actualAns === q.correct;
                    } else {
                        isCorrect = actualAns === 'correct';
                    }
                    if (wasRewound) {
                        cls = isCorrect ? 'rewound-correct' : 'rewound-incorrect';
                    } else if (isCorrect) {
                        cls = 'correct'; // green
                    } else {
                        cls = 'incorrect'; // red
                    }
                }
                const qLabel = q.text ? q.text.replace(/"/g, '&quot;') : `Fråga ${idx+1}`;
                let ansLabel = 'Ej besvarad';
                let ansColor = 'var(--sp-text-muted)';
                if (rawAns) {
                    const wasRewound = rawAns.startsWith('R');
                    const actualAns = wasRewound ? rawAns.substring(1) : rawAns;
                    if (q.type === 'multiple-choice') {
                        const opt = q.options ? q.options.find(o => o.letter === actualAns) : null;
                        const optText = opt ? opt.text : '';
                        ansLabel = `Svar: (${actualAns}) ${optText}`;
                    } else if (q.type === 'feedback') {
                        try {
                            const [stars, ...commentParts] = actualAns.split('|');
                            const starsVal = parseInt(stars) || 0;
                            const starsStr = '★'.repeat(starsVal) + '☆'.repeat(5 - starsVal);
                            const commentText = commentParts.join('|');
                            ansLabel = `Betyg: ${starsStr}${commentText ? `<br>Kommentar: "${commentText}"` : ''}`;
                        } catch(e) { ansLabel = `Svar: ${actualAns}`; }
                    } else {
                        ansLabel = `Svar: ${actualAns}`;
                    }
                    if (cls.includes('correct')) {
                        ansColor = 'var(--sp-correct)';
                        ansLabel += ' (Rätt)';
                    } else if (cls.includes('incorrect')) {
                        ansColor = 'var(--sp-incorrect)';
                        ansLabel += ' (Fel)';
                    }
                }
                html += `<div class="sp-q-square ${cls}" data-q="${idx+1}">
                    <div class="sp-tooltip">
                        <strong>F${idx+1}:</strong> ${qLabel}<br>
                        <span style="color: ${ansColor}; font-weight: 500;">${ansLabel}</span>
                    </div>
                </div>`;
            });
            
            html += '</div></div>';
        });

        dashboard.innerHTML = html;

        // Feedback summary section
        const fbQ = CONFIG_DATA.questions.find(q => q.type === 'feedback');
        if (fbQ) {
            let fbHtml = '<div style="margin-top:1.2rem;padding:0.8rem;background:rgba(255,255,255,0.03);border-radius:0.6rem;border:1px solid var(--sp-border);">';
            fbHtml += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;">';
            fbHtml += '<div style="font-size:0.8rem;font-weight:600;color:var(--sp-accent);">📊 Elevfeedback</div>';
            fbHtml += '<button onclick="copyFeedback()" style="font-size:0.65rem;padding:0.25rem 0.6rem;background:var(--sp-accent-soft);color:var(--sp-accent);border:1px solid var(--sp-accent);border-radius:0.4rem;cursor:pointer;" id="spCopyFbBtn">📋 Kopiera</button>';
            fbHtml += '</div>';
            const feedbacks = [];
            SP.knownStudents.forEach((name, sid) => {
                const ansMap = SP.studentAnswers.get(sid) || {};
                const raw = ansMap[fbQ.id];
                if (raw) {
                    try {
                        // raw is already decoded plain text (e.g. "4|Bra övning")
                        const [stars, ...commentParts] = raw.split('|');
                        const comment = commentParts.join('|');
                        feedbacks.push({ name, stars: parseInt(stars) || 0, comment });
                    } catch(e) { /* skip */ }
                }
            });
            if (feedbacks.length > 0) {
                const avg = (feedbacks.reduce((s,f) => s + f.stars, 0) / feedbacks.length).toFixed(1);
                fbHtml += `<div style="font-size:1.1rem;margin-bottom:0.4rem;">Snitt: ${'★'.repeat(Math.round(avg))}${'☆'.repeat(5 - Math.round(avg))} (${avg}/5, ${feedbacks.length} svar)</div>`;
                feedbacks.forEach(f => {
                    const safeComment = f.comment.replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    fbHtml += `<div style="font-size:0.75rem;padding:0.3rem 0;border-top:1px solid var(--sp-border);">`;
                    fbHtml += `<strong>${f.name}</strong> ${'★'.repeat(f.stars)}${'☆'.repeat(5-f.stars)}: ${safeComment}</div>`;
                });
            } else {
                fbHtml += '<div style="font-size:0.75rem;color:var(--sp-text-muted);">Ingen feedback ännu</div>';
            }
            fbHtml += '</div>';
            dashboard.innerHTML += fbHtml;

            // Store feedbacks for copy function
            window._spFeedbacks = feedbacks;
        }
    }
    // Copy feedback to clipboard
    function copyFeedback() {
        const feedbacks = window._spFeedbacks || [];
        if (feedbacks.length === 0) {
            const btn = document.getElementById('spCopyFbBtn');
            if (btn) { btn.textContent = '❌ Ingen data'; setTimeout(() => btn.textContent = '📋 Kopiera', 2000); }
            return;
        }
        const avg = (feedbacks.reduce((s,f) => s + f.stars, 0) / feedbacks.length).toFixed(1);
        let text = `SoundPulse Elevfeedback (${new Date().toLocaleDateString('sv-SE')})\n`;
        text += `Snitt: ${avg}/5 (${feedbacks.length} svar)\n`;
        text += `${'─'.repeat(40)}\n`;
        feedbacks.forEach(f => {
            text += `${f.name}: ${'★'.repeat(f.stars)}${'☆'.repeat(5-f.stars)} (${f.stars}/5)\n`;
            if (f.comment) text += `  "${f.comment}"\n`;
        });
        navigator.clipboard.writeText(text).then(() => {
            const btn = document.getElementById('spCopyFbBtn');
            if (btn) { btn.textContent = '✅ Kopierat!'; setTimeout(() => btn.textContent = '📋 Kopiera', 2000); }
        }).catch(() => {
            // Fallback for older browsers
            const ta = document.createElement('textarea');
            ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
            const btn = document.getElementById('spCopyFbBtn');
            if (btn) { btn.textContent = '✅ Kopierat!'; setTimeout(() => btn.textContent = '📋 Kopiera', 2000); }
        });
    }
    window.copyFeedback = copyFeedback;

    // ═══════════════════════════════════════════

    // ═══════════════════════════════════════════

    function showResults() {
        if (!CONFIG_DATA) return;
        const questions = CONFIG_DATA.questions;
        let correctCount = 0;
        const rows = [];

        questions.forEach((q, idx) => {
            const ans = SP.answers[q.id];
            let isCorrect = false;
            if (q.type === 'freetext' || q.type === 'feedback') {
                isCorrect = !!ans;
            } else if (q.type === 'multiple-choice') {
                isCorrect = ans === q.correct;
            } else {
                isCorrect = ans === 'correct';
            }
            if (isCorrect) correctCount++;
            rows.push({ q, idx, ans, isCorrect });
        });

        const validQuestions = questions.filter(q => q.type !== 'feedback');
        const validCount = validQuestions.length || 1;
        const pct = Math.round((correctCount / validCount) * 100);
        let resultIcon, message;
        if (pct === 100) { resultIcon = '★'; message = t('fullScore'); }
        else if (pct >= 70) { resultIcon = '★'; message = t('goodScore'); }
        else if (pct >= 40) { resultIcon = '○'; message = t('okScore'); }
        else { resultIcon = '○'; message = t('lowScore'); }

        const wrap = document.getElementById('spQuestionWrap');
        const card = document.getElementById('spQuestionCard');
        if (!wrap || !card) return;

        // V7: Smart results — show summary + only wrong answers with feedback
        const wrongRows = rows.filter(r => !r.isCorrect && r.q.type !== 'freetext' && r.q.type !== 'feedback');
        const freetextRows = rows.filter(r => r.q.type === 'freetext');

        let html = `
            <div class="sp-results">
                <div class="sp-results-emoji">${resultIcon}</div>
                <h2>${message}</h2>
                <p class="sp-score-line">${correctCount} av ${validCount} rätt (${pct}%)</p>
            </div>`;

        if (wrongRows.length === 0) {
            html += `<p style="text-align:center;color:var(--sp-correct);font-weight:500;margin:1rem 0">✨ Alla rätt — fantastiskt jobbat!</p>`;
        } else {
            html += `<p style="font-size:0.85rem;color:var(--sp-text-muted);margin:1rem 0 0.5rem">ℹ️ Klicka på en fråga för att läsa mer:</p>`;
            wrongRows.forEach(r => {
                const feedback = r.q.feedbackNok || r.q.feedbackOk || '';
                const shortText = r.q.text.substring(0, 55) + (r.q.text.length > 55 ? '...' : '');
                html += `<div class="sp-result-row nok" style="cursor:pointer;" onclick="showResultPopup(this)" data-full-q="${r.q.text.replace(/"/g, '&quot;')}" data-feedback="${feedback.replace(/"/g, '&quot;')}">
                    <span class="sp-result-icon">✗</span>
                    <span style="font-weight:500;font-size:0.8rem;">F${r.idx + 1}: ${shortText}</span>
                </div>`;
            });
        }

        html += `<div style="display:flex;gap:0.8rem;margin-top:1.5rem;flex-wrap:wrap;justify-content:center;">
            <button class="sp-btn-primary" style="width:auto;padding:0.7rem 1.5rem" onclick="closeQuestion()" role="button" tabindex="0"
                ${keyHandler('closeQuestion()')}>${t('continueBtn')}</button>
        </div>`;

        card.innerHTML = html;
        wrap.classList.add('show');
        // Activate focus trap for results overlay (Bug 1)
        requestAnimationFrame(() => trapFocus(card));
    }

    function saveSession() {
        if (SP.mode !== 'live' || !SP.studentId) return;
        try {
            const session = {
                studentId: SP.studentId,
                studentName: SP.studentName,
                currentQ: SP.currentQ,
                answers: SP.answers,
                maxListenedTime: SP.maxListenedTime,
                rewoundQuestions: Array.from(SP.rewoundQuestions),
                activatedQuestions: Array.from(SP.activatedQuestions),
                studentPaused: SP.studentPaused
            };
            localStorage.setItem('sp_session', JSON.stringify(session));
        } catch (e) {
            console.error('Failed to save session:', e);
        }
    }

    let _autoSaveTimer = null;
    function startAutoSaveTimer() {
        if (_autoSaveTimer) return;
        _autoSaveTimer = setInterval(saveSession, 5000);
    }

    function logoutSession() {
        if (confirm("Vill du starta om övningen och ta bort dina svar på denna enhet?")) {
            localStorage.removeItem('sp_session');
            try {
                const keysToRemove = [];
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key && (key.startsWith('sp_fallback_') || key === 'sp_pending_sync')) {
                        keysToRemove.push(key);
                    }
                }
                keysToRemove.forEach(k => localStorage.removeItem(k));
            } catch(e) {}
            window.location.reload();
        }
    }
    window.logoutSession = logoutSession;


    // ═══════════════════════════════════════════

    // ═══════════════════════════════════════════

    async function init() {
        // Load config
        try {
            const resp = await fetch('assets/soundpulse_config.json');
            CONFIG_DATA = await resp.json();
            SP_CONFIG.APP_KEY = CONFIG_DATA.appKey || SP_CONFIG.APP_KEY;
            SP_CONFIG.AUDIO_FILE = CONFIG_DATA.audioFile || SP_CONFIG.AUDIO_FILE;
        } catch(e) {
            console.warn('Config not loaded, using defaults:', e);
        }

        // V8: Validate triggerTimes
        if (CONFIG_DATA && CONFIG_DATA.questions) {
            CONFIG_DATA.questions.forEach((q, i) => {
                if (typeof q.triggerTime !== 'number' || q.triggerTime < 0) {
                    console.warn(`Question ${i} has invalid triggerTime:`, q.triggerTime);
                    q.triggerTime = 0;
                }
            });
        }

        // Check mode
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('mode') === 'teacher') {
            SP.mode = 'teacher';
            renderTeacherPanel();
        } else {
            // Check if there is an active session to restore
            const savedSessionStr = localStorage.getItem('sp_session');
            if (savedSessionStr) {
                try {
                    const saved = JSON.parse(savedSessionStr);
                    if (saved.studentId && saved.studentName) {
                        // Restore state
                        SP.studentId = saved.studentId;
                        SP.studentName = saved.studentName;
                        SP.currentQ = saved.currentQ ?? -1;
                        SP.answers = saved.answers || {};
                        SP.maxListenedTime = saved.maxListenedTime || 0;
                        SP.rewoundQuestions = new Set(saved.rewoundQuestions || []);
                        SP.activatedQuestions = new Set(saved.activatedQuestions || []);
                        SP.studentPaused = saved.studentPaused || false;
                        SP.mode = 'live';

                        console.log('Restored session for student:', SP.studentName, SP.studentId);

                        // If resuming, skip instruction overlay
                        introActive = false;

                        renderStudentView();

                        // If reload occurred while a question was active
                        if (SP.currentQ !== -1) {
                            const q = CONFIG_DATA && CONFIG_DATA.questions ? CONFIG_DATA.questions[SP.currentQ] : null;
                            if (q && SP.answers[q.id]) {
                                // Already answered, close and resume
                                SP.currentQ = -1;
                            } else {
                                showQuestion(SP.currentQ);
                            }
                        }

                        // Register on server (handles slots and hearts)
                        registerStudent();

                        // Start auto-save timer
                        startAutoSaveTimer();

                        // Try syncing any pending data immediately
                        syncOfflineData();
                        return;
                    }
                } catch (e) {
                    console.warn('Failed to restore session:', e);
                }
            }
            renderLogin();
        }
    }

    // Online/offline events
    window.addEventListener('online', () => {
        handleOnline();
        syncOfflineData();
    });
    window.addEventListener('offline', () => { SP.offlineCount = 2; handleOffline(); });

    // Periodic sync check (15s)
    setInterval(syncOfflineData, 15000);

    // Start app
    init();

    </script>
</body>
</html>
