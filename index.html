                        </div>
                        <span style="font-size:0.9rem; color:var(--sp-text);"><strong>Ditt eget bi</strong><br><span style="color:var(--sp-text-muted); font-size:0.8rem;">(Markerat med röd ring)</span></span>
                    </div>
                </div>

                <p style="font-size:0.75rem;color:var(--sp-text-muted)">Japanska honungsbin bildar en vibrerande klunga som övervärmer angriparen — exakt som i verkligheten!</p>
                <button class="sp-btn-primary" style="width:100%;margin-top:1rem;padding:0.8rem 2rem; font-size:1.1rem;" onclick="dismissGameInstructions()">Starta!</button>
            </div>
            <button class="sp-game-exit-btn" role="button" tabindex="0" onclick="exitBeeGame()"
                ${keyHandler('exitBeeGame()')}
                aria-label="Avsluta spelet">✗ Avsluta</button>
        `;
        document.body.appendChild(wrap);
        wrap.classList.add('show');

        GAME.canvas = document.getElementById('spGameCanvas');
        GAME.ctx = GAME.canvas.getContext('2d');
        resizeGameCanvas();
        window.addEventListener('resize', resizeGameCanvas);

        // Input handlers
        GAME.canvas.addEventListener('pointerdown', onGamePointerDown);
        GAME.canvas.addEventListener('pointermove', onGamePointerMove);
        GAME.canvas.addEventListener('pointerup', onGamePointerUp);
        GAME.canvas.addEventListener('pointercancel', onGamePointerUp);
        // Keyboard handlers (WASD/arrows + Escape)
        window.addEventListener('keydown', onGameKeyDown);
        window.addEventListener('keyup', onGameKeyUp);

        // Start sync — SCALABLE for 25+ students
        if (!isTeacher) {
            // STUDENT: 2 API calls per tick (1 write, 1 read)
            GAME.syncInterval = setInterval(async () => {
                if (!GAME.active) return;
                // 1. Send MY position
                const posStr = `${GAME.myBee.x.toFixed(3)}_${GAME.myBee.y.toFixed(3)}_${(GAME.myBee.heading || 0).toFixed(2)}`;
                apiSet(`bee_${SP.studentId}`, posStr); // fire & forget

                // 2. Read game_state (contains hornet + ALL bees)
                const gs = await apiGet('game_state');
                if (!gs) return;
                try {
                    const decoded = hexToStr(gs);
                    const sections = decoded.split('|');
                    // Section 0: hornetX,hornetY,temp,victory
                    const header = sections[0].split(',');
                    if (header.length >= 4) {
                        GAME.hornet.x = parseFloat(header[0]) || 0.5;
                        GAME.hornet.y = parseFloat(header[1]) || 0.5;
                        GAME.temperature = parseFloat(header[2]) || 25;
                        if (header[3] === '1' && !GAME.victory) showVictory();
                        if (header.length > 4 && header[4] === '1' && !GAME.defeat) showDefeat();
                        if (header.length > 5 && header[5]) {
                            GAME.deadBees = new Set(header[5].split(':'));
                        } else {
                            GAME.deadBees = new Set();
                        }
                    }
                    // Sections 1+: sid,x,y,name per bee
                    GAME.allBees.clear();
                    for (let i = 1; i < sections.length; i++) {
                        const bParts = sections[i].split(',');
                        if (bParts.length >= 4 && bParts[0] !== SP.studentId) {
                            GAME.allBees.set(bParts[0], {
                                x: parseFloat(bParts[1]) || 0.5,
                                y: parseFloat(bParts[2]) || 0.5,
                                name: bParts[3],
                                heading: parseFloat(bParts[4]) || 0
                            });
                        }
                    }
                } catch(e) { console.warn('Game state parse error:', e); }
            }, 500);
        } else {
            // TEACHER: parallel reads with Promise.all, single broadcast
            GAME.syncInterval = setInterval(async () => {
                if (!GAME.active) return;
                // 1. Parallel fetch ALL student bee positions
                const studentIds = [...SP.knownStudents.keys()];
                const results = await Promise.all(
                    studentIds.map(sid => apiGet(`bee_${sid}`).catch(() => null))
                );
                results.forEach((raw, i) => {
                    if (!raw) return;
                    const bParts = raw.split('_').map(parseFloat);
                    if (!isNaN(bParts[0]) && !isNaN(bParts[1])) {
                        const name = SP.knownStudents.get(studentIds[i]) || 'Gäst';
                        GAME.allBees.set(studentIds[i], { x: bParts[0], y: bParts[1], heading: bParts[2] || 0, name });
                    }
                });

                // 2. Build game_state: header|bee1|bee2|...
                const deadStr = Array.from(GAME.deadBees).join(':');
                let stateStr = `${GAME.hornet.x.toFixed(3)},${GAME.hornet.y.toFixed(3)},${GAME.temperature.toFixed(1)},${GAME.victory ? '1' : '0'},${GAME.defeat ? '1' : '0'},${deadStr}`;
                // Include teacher's own bee
                stateStr += `|teacher,${GAME.myBee.x.toFixed(3)},${GAME.myBee.y.toFixed(3)},Lärare,${(GAME.myBee.heading || 0).toFixed(2)}`;
                // Include all student bees
                GAME.allBees.forEach((bee, sid) => {
                    stateStr += `|${sid},${bee.x.toFixed(3)},${bee.y.toFixed(3)},${bee.name},${(bee.heading || 0).toFixed(2)}`;
                });
                await apiSet('game_state', strToHex(stateStr));
            }, 600);
        }

        // Start game loop
        GAME.lastTime = performance.now();
        gameLoop();
    }

    function resizeGameCanvas() {
        if (!GAME.canvas) return;
        GAME.canvas.width = window.innerWidth;
        GAME.canvas.height = window.innerHeight;
    }

    function dismissGameInstructions() {
        const el = document.getElementById('spGameInstructions');
        if (el) el.style.display = 'none';
    }

    // ─── Input ───
    function onGamePointerDown(e) {
        GAME.pointerDown = true;
        updatePointerTarget(e);
    }
    function onGamePointerMove(e) {
        if (GAME.pointerDown) updatePointerTarget(e);
    }
    function onGamePointerUp() { GAME.pointerDown = false; }
    function updatePointerTarget(e) {
        if (!GAME.canvas) return;
        GAME.pointerTarget.x = e.clientX / GAME.canvas.width;
        GAME.pointerTarget.y = e.clientY / GAME.canvas.height;
    }

    // ─── Keyboard Input (WASD + Arrows) ───
    function onGameKeyDown(e) {
        const k = e.key;
        if (['w','a','s','d','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(k)) {
            e.preventDefault();
            GAME.keysDown.add(k);
        }
        if (k === 'Escape') exitBeeGame();
    }
    function onGameKeyUp(e) {
        GAME.keysDown.delete(e.key);
    }

    // ─── Game Loop ───
    function gameLoop() {
        if (!GAME.active) return;
        const now = performance.now();
        const dt = Math.min((now - GAME.lastTime) / 1000, 0.1);
        GAME.lastTime = now;

        updateBeeMovement(dt);

        // Only teacher runs the hornet AI and temperature logic
        if (SP.mode === 'teacher') {
            updateHornetAI(dt);
            updateTemperature(dt);
        }

        renderGame();
        GAME.animFrame = requestAnimationFrame(gameLoop);
    }

    function updateBeeMovement(dt) {
        if (GAME.isDemo && GAME.demoBees) {
            GAME.demoBees.forEach(b => {
                if (GAME.deadBees.has(b.id)) return;
                const dx = GAME.hornet.x - b.x;
                const dy = GAME.hornet.y - b.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > 0) {
                    const speed = 0.05 + Math.random() * 0.03;
                    b.x += (dx/dist + (Math.random()-0.5)*1.5) * speed * dt;
                    b.y += (dy/dist + (Math.random()-0.5)*1.5) * speed * dt;
                    b.x = Math.max(0.02, Math.min(0.98, b.x));
                    b.y = Math.max(0.02, Math.min(0.98, b.y));
                    b.heading = Math.atan2(dy, dx);
                }
            });
        }

        if (GAME.deadBees && GAME.deadBees.has(SP.mode === 'teacher' ? 'teacher' : SP.studentId)) return;

        // Keyboard input (WASD/arrows) — direct velocity control
        const keys = GAME.keysDown;
        let kx = 0, ky = 0;
        if (keys.has('w') || keys.has('ArrowUp')) ky = -1;
        if (keys.has('s') || keys.has('ArrowDown')) ky = 1;
        if (keys.has('a') || keys.has('ArrowLeft')) kx = -1;
        if (keys.has('d') || keys.has('ArrowRight')) kx = 1;
        const hasKeyInput = kx !== 0 || ky !== 0;

        if (hasKeyInput && !GAME.victory) {
            // Normalize diagonal movement
            const len = Math.sqrt(kx * kx + ky * ky);
            const move = GAME.beeSpeed * dt;
            GAME.myBee.x += (kx / len) * move;
            GAME.myBee.y += (ky / len) * move;
            const targetAngle = Math.atan2(ky, kx);
            GAME.myBee.heading = lerpAngle(GAME.myBee.heading, targetAngle, 0.15);
        } else if (GAME.pointerDown && !GAME.victory) {
            // Pointer/touch input — move toward target
            const dx = GAME.pointerTarget.x - GAME.myBee.x;
            const dy = GAME.pointerTarget.y - GAME.myBee.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist > 0.005) {
                const move = Math.min(GAME.beeSpeed * dt, dist);
                GAME.myBee.x += (dx / dist) * move;
                GAME.myBee.y += (dy / dist) * move;
                const targetAngle = Math.atan2(dy, dx);
                GAME.myBee.heading = lerpAngle(GAME.myBee.heading, targetAngle, 0.15);
            }
        }
        // Clamp
        GAME.myBee.x = Math.max(0.02, Math.min(0.98, GAME.myBee.x));
        GAME.myBee.y = Math.max(0.02, Math.min(0.98, GAME.myBee.y));
    }

    // Smooth angle interpolation (handles wrapping)
    function lerpAngle(a, b, t) {
        let diff = b - a;
        while (diff > Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        return a + diff * t;
    }

    function updateHornetAI(dt) {
        if (GAME.victory) return;
        const h = GAME.hornet;

        // Collect all bees (teacher's own + remote)
        const bees = [];
        if (SP.mode === 'teacher') {
            // Teacher also plays as a bee
            bees.push({ x: GAME.myBee.x, y: GAME.myBee.y, id: 'teacher' });
        }
        GAME.allBees.forEach((bee, sid) => {
            bees.push({ x: bee.x, y: bee.y, id: sid });
        });
        if (GAME.isDemo && GAME.demoBees) {
            GAME.demoBees.forEach(b => bees.push({ x: b.x, y: b.y, id: b.id }));
        }

        if (bees.length === 0) return;

        // Collect living bees for target selection
        const livingBees = bees.filter(b => !GAME.deadBees.has(b.id));

        if (livingBees.length === 0) return;

        // Chase timer
        h.chaseTimer -= dt;

        // Find nearest bee OR retarget if target is dead or timer expired
        if (!h.targetBee || h.chaseTimer <= 0 || GAME.deadBees.has(h.targetBee)) {
            let nearest = null, nearestDist = Infinity;
            livingBees.forEach(b => {
                const dx = b.x - h.x, dy = b.y - h.y;
                const d = Math.sqrt(dx * dx + dy * dy);
                if (d < nearestDist) { nearestDist = d; nearest = b; }
            });

            // Check if another bee is very close to the hornet (defender)
            const defenders = livingBees.filter(b => {
                const dx = b.x - h.x, dy = b.y - h.y;
                return Math.sqrt(dx * dx + dy * dy) < GAME.heatRadius * 1.5;
            });

            if (defenders.length >= 3) {
                // If enough bees are swarming, hornet slows down (overwhelmed)
                h.speed = 0.06;
            } else {
                h.speed = 0.12;
            }

            h.targetBee = nearest ? nearest.id : null;
            h.chaseTimer = GAME.chaseStickTime;
        }

        // Move toward target
        const target = livingBees.find(b => b.id === h.targetBee) || livingBees[0];
        if (target) {
            const dx = target.x - h.x;
            const dy = target.y - h.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist > 0.01) {
                h.vx = (dx / dist) * h.speed;
                h.vy = (dy / dist) * h.speed;
            }
        }

        h.x += h.vx * dt;
        h.y += h.vy * dt;
        h.x = Math.max(0.03, Math.min(0.97, h.x));
        h.y = Math.max(0.03, Math.min(0.97, h.y));
        // Track heading from velocity
        if (Math.abs(h.vx) > 0.001 || Math.abs(h.vy) > 0.001) {
            h.heading = lerpAngle(h.heading, Math.atan2(h.vy, h.vx), 0.1);
        }

        // Hornet eats bees if temperature is below 42C (cannot eat effectively when overheating)
        if (GAME.temperature < 42) {
            const eatRadius = 0.015; // Match new beeSize
            livingBees.forEach(b => {
                const dx = b.x - h.x, dy = b.y - h.y;
                if (Math.sqrt(dx * dx + dy * dy) < eatRadius) {
                    GAME.deadBees.add(b.id);
                }
            });
        }

        // Track initial swarm size and check for Swarm Collapse
        const aliveCount = bees.length - GAME.deadBees.size;
        if (GAME.initialBeeCount === 0) GAME.initialBeeCount = Math.max(1, bees.length);
        
        // Swarm collapse: Game over if less than half the swarm remains (or < 3 total and someone died)
        if (GAME.initialBeeCount > 0 && GAME.deadBees.size > 0 && aliveCount < Math.max(3, GAME.initialBeeCount / 2)) {
            if (!GAME.defeat) showDefeat();
        }
    }

    function updateTemperature(dt) {
        if (GAME.victory) return;
        const h = GAME.hornet;

        // Count bees within heat radius
        let nearbyCount = 0;
        const myId = SP.mode === 'teacher' ? 'teacher' : SP.studentId;
        const bees = [{ id: myId, x: GAME.myBee.x, y: GAME.myBee.y }];
        GAME.allBees.forEach((b, sid) => bees.push({ id: sid, x: b.x, y: b.y }));
        if (GAME.isDemo && GAME.demoBees) {
            GAME.demoBees.forEach(b => bees.push({ id: b.id, x: b.x, y: b.y }));
        }

        bees.forEach(b => {
            if (!GAME.deadBees.has(b.id)) {
                const dx = b.x - h.x, dy = b.y - h.y;
                if (Math.sqrt(dx * dx + dy * dy) < GAME.heatRadius) nearbyCount++;
            }
        });

        if (nearbyCount > 0) {
            // Heat = more bees = faster (quadratic-ish for teamwork bonus)
            const heatBonus = 1 + (nearbyCount - 1) * 0.5;
            GAME.temperature += GAME.heatRate * nearbyCount * heatBonus * dt;
        } else {
            GAME.temperature -= GAME.coolRate * dt;
        }

        GAME.temperature = Math.max(GAME.ambientTemp, Math.min(55, GAME.temperature));

        // Check victory
        if (GAME.temperature >= GAME.lethalTemp) {
            showVictory();
        }

        // Update HUD
        updateTempHUD();
    }

    function updateTempHUD() {
        const fill = document.getElementById('spGameTempFill');
        const text = document.getElementById('spGameTempText');
        const status = document.getElementById('spGameStatus');

        const pct = ((GAME.temperature - GAME.ambientTemp) / (GAME.lethalTemp - GAME.ambientTemp)) * 100;
        if (fill) fill.style.width = Math.min(100, pct) + '%';
        if (text) text.textContent = GAME.temperature.toFixed(1) + '°C';
        if (status) {
            if (GAME.defeat) status.textContent = 'SVÄRMEN ÄR BESEGRAD!';
            else if (GAME.temperature < 30) status.textContent = 'Samla bina runt getingen!';
            else if (GAME.temperature < 38) status.textContent = 'Temperaturen stiger! Håll er nära!';
            else if (GAME.temperature < 45) status.textContent = 'Nästan! Getingen är trängd!';
            else status.textContent = 'KRITISK TEMPERATUR!';
        }
    }

    function showVictory() {
        GAME.victory = true;
        GAME.victoryTime = performance.now();
        if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 200]);

        const wrap = document.getElementById('spGameWrap');
        if (!wrap) return;

        const victoryDiv = document.createElement('div');
        victoryDiv.className = 'sp-game-victory';
        victoryDiv.id = 'spGameVictory';
        victoryDiv.innerHTML = `
            <div style="font-size:3rem;margin-bottom:1rem;font-weight:700;color:var(--sp-accent)">★ SEGER ★</div>
            <h1>GETINGEN BESEGRADES!</h1>
            <p>Temperaturen nådde ${GAME.temperature.toFixed(1)}°C — dödligt för Vespa mandarinia!</p>
            <p style="font-size:0.85rem;color:var(--sp-text-muted);max-width:500px;text-align:center">
                I verkligheten bildar japanska honungsbin (Apis cerana japonica) en "värmeboll" runt angripande
                jättegetingar. Hundratals bin vibrerar sina flygmuskler och höjer temperaturen till ~47°C.
                Bina tål upp till 50°C, men getingen dör av överhettning.
            </p>
            <button class="sp-btn-primary" style="width:auto;padding:0.8rem 2rem;margin-top:1rem;"
                onclick="exitBeeGame()">
                Tillbaka till SoundPulse
            </button>`;
        wrap.appendChild(victoryDiv);
    }

    function showDefeat() {
        if (GAME.defeat) return;
        GAME.defeat = true;
        if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 300]);

        const wrap = document.getElementById('spGameWrap');
        if (!wrap) return;

        const defeatDiv = document.createElement('div');
        defeatDiv.className = 'sp-game-victory';
        defeatDiv.id = 'spGameDefeat';
        defeatDiv.innerHTML = `
            <div style="font-size:3rem;margin-bottom:1rem;font-weight:700;color:var(--sp-incorrect)">☠ KOLLAPS ☠</div>
            <h1>SVÄRMEN ÄR UPPÄTEN!</h1>
            <p>För många bin dog och värmebollen kollapsade.</p>
            <p style="font-size:0.85rem;color:var(--sp-text-muted);max-width:500px;text-align:center">
                För att lyckas måste bina nå den dödliga temperaturen 47°C snabbt. Om för många bin blir 
                uppätna försvinner den kritiska massan som krävs för att generera och isolera värmen. 
                Sammetsgetingen dör inte utan er kollektiva värme.
            </p>
            <button class="sp-btn-primary" style="width:auto;padding:0.8rem 2rem;margin-top:1rem;background:var(--sp-incorrect);border-color:var(--sp-incorrect)"
                onclick="exitBeeGame()">
                Tillbaka till SoundPulse
            </button>`;
        wrap.appendChild(defeatDiv);
    }

    function exitBeeGame() {
        GAME.active = false;
        if (GAME.animFrame) cancelAnimationFrame(GAME.animFrame);
        if (GAME.syncInterval) clearInterval(GAME.syncInterval);
        window.removeEventListener('resize', resizeGameCanvas);
        window.removeEventListener('keydown', onGameKeyDown);
        window.removeEventListener('keyup', onGameKeyUp);
        GAME.keysDown.clear();

        const wrap = document.getElementById('spGameWrap');
        if (wrap) wrap.remove();
    }

    // ─── Render ───
    function renderGame() {
        const ctx = GAME.ctx;
        const W = GAME.canvas.width;
        const H = GAME.canvas.height;
        if (!ctx) return;

        // Background — dark nature scene
        ctx.fillStyle = '#0a1a0a';
        ctx.fillRect(0, 0, W, H);

        // Subtle grass/ground gradient
        const grd = ctx.createRadialGradient(W * 0.5, H * 0.5, 0, W * 0.5, H * 0.5, W * 0.6);
        grd.addColorStop(0, 'rgba(16, 48, 16, 0.3)');
        grd.addColorStop(1, 'rgba(5, 15, 5, 0)');
        ctx.fillStyle = grd;
        ctx.fillRect(0, 0, W, H);

        // "Stars" / ambient particles
        GAME.bgStars.forEach(s => {
            ctx.beginPath();
            ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(200, 230, 200, ${s.a * (0.5 + 0.5 * Math.sin(performance.now() / 2000 + s.x * 10))})`;
            ctx.fill();
        });

        const toX = (nx) => nx * W;
        const toY = (ny) => ny * H;
        const beeSize = Math.min(W, H) * 0.018; // Reduced from 0.03
        const hornetSize = Math.min(W, H) * 0.03; // Reduced from 0.05

        // Heat radius visualization
        if (!GAME.victory) {
            const hr = GAME.heatRadius * Math.min(W, H);
            ctx.beginPath();
            ctx.arc(toX(GAME.hornet.x), toY(GAME.hornet.y), hr, 0, Math.PI * 2);
            const heatAlpha = Math.min(0.25, (GAME.temperature - 25) / 50);
            ctx.fillStyle = `rgba(239, 68, 68, ${heatAlpha})`;
            ctx.fill();
            ctx.strokeStyle = `rgba(239, 68, 68, ${0.15 + heatAlpha})`;
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 4]);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // Draw remote bees (heading from synced data or 0)
        GAME.allBees.forEach((bee, sid) => {
            if (GAME.deadBees && GAME.deadBees.has(sid)) ctx.globalAlpha = 0.3;
            drawBee(ctx, toX(bee.x), toY(bee.y), beeSize, bee.name, false, bee.heading || 0);
            ctx.globalAlpha = 1.0;
        });

        // Draw demo bees
        if (GAME.isDemo && GAME.demoBees) {
            GAME.demoBees.forEach(bee => {
                if (GAME.deadBees && GAME.deadBees.has(bee.id)) ctx.globalAlpha = 0.3;
                drawBee(ctx, toX(bee.x), toY(bee.y), beeSize, bee.name, false, bee.heading || 0);
                ctx.globalAlpha = 1.0;
            });
        }

        // Draw my bee (with tracked heading)
        const myId = SP.mode === 'teacher' ? 'teacher' : SP.studentId;
        if (GAME.deadBees && GAME.deadBees.has(myId)) ctx.globalAlpha = 0.3;
        drawBee(ctx, toX(GAME.myBee.x), toY(GAME.myBee.y), beeSize * 1.1,
            SP.mode === 'teacher' ? 'Lärare' : SP.studentName, true, GAME.myBee.heading);
        ctx.globalAlpha = 1.0;

        // Draw hornet
        drawHornet(ctx, toX(GAME.hornet.x), toY(GAME.hornet.y), hornetSize);

        // Temperature visual on hornet
        if (GAME.temperature > 30) {
            const glowRadius = hornetSize * (1 + (GAME.temperature - 30) / 15);
            const gradient = ctx.createRadialGradient(
                toX(GAME.hornet.x), toY(GAME.hornet.y), hornetSize * 0.3,
                toX(GAME.hornet.x), toY(GAME.hornet.y), glowRadius
            );
            gradient.addColorStop(0, `rgba(245, 158, 11, ${(GAME.temperature - 30) / 40})`);
            gradient.addColorStop(1, 'rgba(239, 68, 68, 0)');
            ctx.beginPath();
            ctx.arc(toX(GAME.hornet.x), toY(GAME.hornet.y), glowRadius, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();
        }

        // HUD update for student
        if (SP.mode !== 'teacher') updateTempHUD();
    }

    function drawBee(ctx, x, y, size, name, isMe, heading) {
        const angle = typeof heading === 'number' ? heading : 0;
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);

        // Highlight for own bee
        if (isMe) {
            const pulse = 1 + Math.sin(performance.now() / 150) * 0.15;
            ctx.beginPath();
            ctx.arc(0, 0, size * 2.2 * pulse, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(239, 68, 68, 0.15)'; // Red background pulse
            ctx.fill();
            ctx.lineWidth = 2;
            ctx.strokeStyle = 'rgba(239, 68, 68, 0.8)'; // Red border
            ctx.stroke();
        }

        // Always use yellow circle for bee
        ctx.beginPath();
        ctx.arc(0, 0, size, 0, Math.PI*2);
        ctx.fillStyle = '#eab308'; // Tailwind Yellow-500
        ctx.fill();

        ctx.restore();

        // Name label (unrotated)
        if (name) {
            const fontSize = Math.max(10, size * 0.65);
            ctx.font = `bold ${fontSize}px Inter, sans-serif`;
            const textWidth = ctx.measureText(name).width;
            const labelY = y + size * 1.6 + 5;
            
            // Background pill for legibility
            ctx.fillStyle = isMe ? 'rgba(239, 68, 68, 0.15)' : 'rgba(0, 0, 0, 0.4)';
            if (ctx.roundRect) {
                ctx.beginPath();
                ctx.roundRect(x - textWidth/2 - 6, labelY - fontSize, textWidth + 12, fontSize + 4, 4);
                ctx.fill();
                if (isMe) {
                    ctx.strokeStyle = 'rgba(239, 68, 68, 0.4)';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            }
            
            ctx.fillStyle = isMe ? '#ef4444' : 'rgba(255,255,255,0.7)';
            ctx.textAlign = 'center';
            ctx.fillText(name, x, labelY);
        }
    }

    // ─── SAMMETSGETING (Vespa mandarinia) ───
    function drawHornet(ctx, x, y, size) {
        const angle = GAME.hornet.heading || 0;
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);

        // Always use orange circle for hornet
        ctx.beginPath();
        ctx.arc(0, 0, size, 0, Math.PI*2);
        ctx.fillStyle = '#f97316'; // Tailwind Orange-500
        ctx.fill();

        ctx.restore();


        // Label (unrotated, below)
        ctx.font = `bold ${Math.max(11, size * 0.45)}px Inter, sans-serif`;
        ctx.fillStyle = '#f97316';
        ctx.textAlign = 'center';
        ctx.fillText('SAMMETSGETING', x, y + size + 16);
    }

    // ═══════════════════════════════════════════
    // INITIALIZATION
    // ═══════════════════════════════════════════

    async function init() {
        // Load config
        try {
            const resp = await fetch('assets/soundpulse_config.json');
            CONFIG_DATA = await resp.json();
            SP_CONFIG.APP_KEY = CONFIG_DATA.appKey || SP_CONFIG.APP_KEY;
            SP_CONFIG.AUDIO_FILE = CONFIG_DATA.audioFile || SP_CONFIG.AUDIO_FILE;
        } catch(e) {
            console.warn('Config not loaded, using defaults:', e);
        }

        // V8: Validate triggerTimes
        if (CONFIG_DATA && CONFIG_DATA.questions) {
            CONFIG_DATA.questions.forEach((q, i) => {
                if (typeof q.triggerTime !== 'number' || q.triggerTime < 0) {
                    console.warn(`Question ${i} has invalid triggerTime:`, q.triggerTime);
                    q.triggerTime = 0;
                }
            });
        }

        // Check mode
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('mode') === 'teacher') {
            SP.mode = 'teacher';
            renderTeacherPanel();
        } else {
            renderLogin();
        }
    }

    // Online/offline events
    window.addEventListener('online', handleOnline);
    window.addEventListener('offline', () => { SP.offlineCount = 2; handleOffline(); });

    // Start app
    init();

    </script>
